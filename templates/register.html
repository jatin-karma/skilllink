{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="app-container auth-app-container">
    <div class="particles" aria-hidden="true">
        <span class="particle p1"></span>
        <span class="particle p2"></span>
        <span class="particle p3"></span>
        <span class="particle p4"></span>
    </div>

    <section class="auth-page-content">
        <article class="auth-card auth-card-register panel">
            <h2>Create Account</h2>
            <p>Join the peer-learning community and start exchanging skills.</p>
            <form method="post" class="stack-form" id="signupForm">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <input type="hidden" name="bio" id="bioHidden">

                <div class="grid-inputs">
                    <div class="input-group">
                        <label for="userName">User Name</label>
                        <input type="text" id="userName" name="name" required placeholder="e.g. Aman Verma">
                    </div>
                    <div class="input-group">
                        <label for="email">Email ID</label>
                        <input type="email" id="email" name="email" required placeholder="aman@example.com">
                    </div>
                    <div class="input-group">
                        <label for="collegeName">College Name</label>
                        <input type="text" id="collegeName" name="college_name" placeholder="Medicaps University">
                    </div>
                    <div class="input-group">
                        <label for="department">Department</label>
                        <input type="text" id="department" name="department" placeholder="Computer Science">
                    </div>
                    <div class="input-group">
                        <label for="enrollmentNumber">Enrollment Number</label>
                        <input type="text" id="enrollmentNumber" name="enrollment_number" placeholder="EN19CS301002">
                    </div>
                    <div class="input-group">
                        <label for="graduationYear">Graduation Year</label>
                        <input type="number" id="graduationYear" name="graduation_year" placeholder="2027">
                    </div>
                    <div class="input-group input-span-2">
                        <label for="address">Address</label>
                        <input type="text" id="address" name="address" placeholder="City, State">
                    </div>
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required placeholder="Secret Key">
                    </div>
                    <div class="input-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" required placeholder="Confirm Secret Key">
                    </div>
                </div>

                <button class="btn btn-primary submit-btn" type="submit">
                    <span class="btn-title">Create Account</span>
                </button>

                <a href="{{ url_for('login') }}" class="auth-link">Already have an account? Sign In</a>
            </form>
        </article>
    </section>
</div>

<script>
(() => {
    const form = document.getElementById('signupForm');
    if (!form) {
        return;
    }

    form.addEventListener('submit', (event) => {
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');
        const bioHidden = document.getElementById('bioHidden');
        if (!passwordInput || !confirmInput || !bioHidden) {
            return;
        }

        if (passwordInput.value !== confirmInput.value) {
            event.preventDefault();
            confirmInput.setCustomValidity('Passwords do not match.');
            confirmInput.reportValidity();
            return;
        }
        bioHidden.value = '';
        confirmInput.setCustomValidity('');
    });
})();
</script>
{% endblock %}
