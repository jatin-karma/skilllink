{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="app-container auth-app-container">
    <div class="particles" aria-hidden="true">
        <span class="particle p1"></span>
        <span class="particle p2"></span>
        <span class="particle p3"></span>
        <span class="particle p4"></span>
    </div>

    <section class="auth-page-content">
        <article class="auth-card panel">
            <h2>Sign In</h2>
            <p>Access your account to manage skills, sessions, and reviews.</p>
            <form method="post" class="stack-form" id="signinForm">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

                <div class="input-group">
                    <label for="email">Email ID</label>
                    <input id="email" name="email" type="email" required placeholder="Enter your email">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" required placeholder="Enter your secret key">
                </div>

                <button class="btn btn-primary submit-btn" type="submit">
                    <span class="btn-title">Sign In</span>
                </button>

                <a href="{{ url_for('register') }}" class="auth-link">Don't have an account? Create Account</a>
            </form>

            <p class="small-muted">Demo users use password: <strong>password123</strong></p>
        </article>
    </section>
</div>
{% endblock %}
